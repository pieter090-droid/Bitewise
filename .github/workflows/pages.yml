name: Deploy HTML prototype (GitHub Pages)

# Publiceert web_prototype/ als website. Open de URL daarna in Safari op je
# iPhone — geen installatie, geen signing nodig.
#
# Eenmalig inschakelen: repo → Settings → Pages → Source = "GitHub Actions".

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths: ['web_prototype/**', '.github/workflows/pages.yml']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web_prototype
      - id: deploy
        uses: actions/deploy-pages@v4
