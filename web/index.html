<!DOCTYPE html>
<html lang="nl">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Scan producten, volg je voeding en ontdek betere swaps met Bitewise.">
  <meta name="theme-color" content="#0D1B2A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bitewise">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bitewise</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #pwa-install-banner {
      position: fixed;
      z-index: 10000;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      left: 16px;
      max-width: 440px;
      margin: 0 auto;
      padding: 16px;
      border: 1px solid rgba(201, 168, 76, 0.55);
      border-radius: 18px;
      background: #0d1b2a;
      color: #fff;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.3);
      font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #pwa-install-banner[hidden] { display: none; }
    #pwa-install-banner strong {
      display: block;
      color: #c9a84c;
      font-size: 17px;
    }
    #pwa-install-banner p { margin: 6px 0 14px; }
    #pwa-install-actions { display: flex; gap: 8px; }
    #pwa-install-button,
    #pwa-install-later {
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    #pwa-install-button {
      flex: 1;
      border: 0;
      background: #c9a84c;
      color: #0d1b2a;
    }
    #pwa-install-later {
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: transparent;
      color: #fff;
    }
    #pwa-ios-steps {
      margin: 12px 0 0;
      padding: 12px 12px 12px 32px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
    }
    @media (display-mode: standalone) {
      #pwa-install-banner { display: none !important; }
    }
  </style>
</head>
<body>
  <aside id="pwa-install-banner" aria-live="polite" hidden>
    <strong>Bitewise op je beginscherm</strong>
    <p id="pwa-install-message">Open Bitewise sneller en gebruik het als app.</p>
    <div id="pwa-install-actions">
      <button id="pwa-install-button" type="button">Installeer Bitewise</button>
      <button id="pwa-install-later" type="button">Later</button>
    </div>
    <ol id="pwa-ios-steps" hidden>
      <li>Tik onderin Safari op <b>Deel</b>.</li>
      <li>Kies <b>Zet op beginscherm</b>.</li>
      <li>Tik op <b>Voeg toe</b>.</li>
    </ol>
  </aside>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (() => {
      const banner = document.getElementById('pwa-install-banner');
      const installButton = document.getElementById('pwa-install-button');
      const laterButton = document.getElementById('pwa-install-later');
      const message = document.getElementById('pwa-install-message');
      const iosSteps = document.getElementById('pwa-ios-steps');
      const dismissedKey = 'bitewise-pwa-install-dismissed';
      const dismissedForMs = 7 * 24 * 60 * 60 * 1000;
      let deferredPrompt = null;

      const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true;
      const isIos = /iphone|ipad|ipod/i.test(window.navigator.userAgent) ||
        (/macintosh/i.test(window.navigator.userAgent) && window.navigator.maxTouchPoints > 1);
      const dismissedAt = Number(window.localStorage.getItem(dismissedKey) || 0);
      const wasRecentlyDismissed = Date.now() - dismissedAt < dismissedForMs;

      const showBanner = () => {
        if (!isStandalone && !wasRecentlyDismissed) banner.hidden = false;
      };

      const hideBanner = () => {
        banner.hidden = true;
      };

      window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault();
        deferredPrompt = event;
        showBanner();
      });

      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        hideBanner();
        window.localStorage.removeItem(dismissedKey);
      });

      installButton.addEventListener('click', async () => {
        if (isIos) {
          message.textContent = 'Installeer Bitewise in drie korte stappen:';
          iosSteps.hidden = false;
          installButton.hidden = true;
          return;
        }

        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        deferredPrompt = null;
        if (choice.outcome === 'accepted') hideBanner();
      });

      laterButton.addEventListener('click', () => {
        window.localStorage.setItem(dismissedKey, String(Date.now()));
        hideBanner();
      });

      if (isIos && !isStandalone && !wasRecentlyDismissed) {
        installButton.textContent = 'Toon installatiestappen';
        window.setTimeout(showBanner, 2200);
      }
    })();
  </script>
</body>
</html>
